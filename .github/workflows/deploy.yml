name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: npm audit — dependency vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Notificar IndexNow
        run: |
          sleep 30  # Aguardar propagação do deploy
          # Busca URLs do sitemap publicado
          URLS=$(curl -s https://atalayia.com.br/sitemap-0.xml | grep -oP 'https://atalayia\.com\.br[^<]+' | sed 's|.*|"&"|' | tr '\n' ',' | sed 's/,$//')
          if [ -z "$URLS" ]; then
            echo "Nenhuma URL encontrada no sitemap"
            exit 0
          fi
          # Envia para IndexNow
          curl -s -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"atalayia.com.br\",
              \"key\": \"be650702f9b97686c3afde02cc0f6cec\",
              \"keyLocation\": \"https://atalayia.com.br/be650702f9b97686c3afde02cc0f6cec.txt\",
              \"urlList\": [${URLS}]
            }" || true
          echo "IndexNow enviado"

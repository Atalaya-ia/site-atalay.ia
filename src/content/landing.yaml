hero:
  badge: "Novo — Avaliacao de imagens"
  title: "A inteligencia editorial em que jornalistas podem confiar"
  subtitle: "Criada para quem produz conteudo com qualidade, contexto e velocidade na era da IA."

proof:
  cards:
    - quote: "Antes eu levava 40 minutos ajustando titulo e meta. Agora o Atalaya faz a primeira sugestao melhor do que eu faria com pressa."
      name: "Editor-chefe"
      role: "Redacao digital — 12 anos de experiencia"
      initials: "RC"
    - quote: "Pela primeira vez, a IA nao inventa — ela conhece nosso manual, nosso tom. Os reporteres aceitam as sugestoes porque reconhecem a propria voz."
      name: "Coordenadora de Digital"
      role: "Gestao editorial — 8 anos"
      initials: "ML"
    - quote: "O radar de tendencias mudou nosso timing. Publicamos sobre temas antes dos concorrentes porque o dado ja estava la, filtrado pela nossa editoria."
      name: "Editor de Esportes"
      role: "Cobertura ao vivo — 15 anos"
      initials: "AF"
    - quote: "Nao e mais IA generica. E a IA que sabe que minha editoria de politica tem regras diferentes da de entretenimento. Isso muda tudo."
      name: "Reporter Especial"
      role: "Politica e investigacao — 10 anos"
      initials: "PS"
    - quote: "Os dados de performance por editoria abriram nossos olhos. Descobrimos que imagem era o fator decisivo em 5 das 13 editorias."
      name: "Gerente de Produto"
      role: "Transformacao digital — 6 anos"
      initials: "JV"
    - quote: "A correcao e cirurgica — so pega erro real, nunca inventa problema. Meus reporteres confiam porque nunca saiu uma sugestao errada."
      name: "Editora de Cidades"
      role: "Jornalismo diario — 9 anos"
      initials: "TB"

values:
  statement: "Uma nova categoria de ferramenta editorial. Construida para as praticas de redacoes de alto desempenho, com IA contextual no centro de cada decisao, o Atalaya define um novo padrao para producao de conteudo."
  cards:
    - fig: "0.2"
      title: "Construido com proposito"
      description: "Moldado pelas praticas e principios das melhores redacoes. Nao e uma ferramenta generica adaptada para jornalismo."
    - fig: "0.3"
      title: "Alimentado por dados reais"
      description: "Historico completo de performance por editoria. A IA so opera com contexto — manual, voz e dados do dominio."
    - fig: "0.4"
      title: "Projetado para velocidade"
      description: "Reduz ruido e restaura momentum. Publica com velocidade e foco, sem trocar qualidade por pressa."

features:
  - id: "optimize"
    title: "Da pauta a publicacao, sem retrabalho"
    description: "Revisao automatica de titulo, imagem, estrutura e SEO — calibrada pelo Manual de Redacao e pelos dados reais do seu dominio."
    link: "1.0 Optimize"
    stats:
      - value: "85%"
        label: "menos tempo de edicao"
      - value: "7"
        label: "campos por materia"
      - value: "100%"
        label: "revisao humana"
    subs:
      - "1.1 Reescrita"
      - "1.2 Correcao"
      - "1.3 Revisao HTML"
      - "1.4 Avaliacao de imagem"

  - id: "trends"
    title: "Detecte oportunidades antes da concorrencia publicar"
    description: "Acompanhe o que esta ganhando forca na busca e no Discover — filtrado pelos assuntos em que sua redacao ja tem autoridade."
    link: "2.0 Trends"
    stats:
      - value: "47min"
        label: "antes da concorrencia"
      - value: "3.2x"
        label: "mais trafego Discover"
      - value: "24/7"
        label: "monitoramento ativo"
    subs:
      - "2.1 Radar Discover"
      - "2.2 Tendencias de Pesquisa"
      - "2.3 Insights Editoriais"

  - id: "voice"
    title: "Cada jornalista tem um agente que escreve como ele"
    description: "A IA analisa como cada jornalista escreve — estilo, tom, estrutura — e aprende a gerar sugestoes que soam como ele."
    link: "3.0 Voz editorial"
    stats:
      - value: "92%"
        label: "aderencia a voz"
      - value: "500+"
        label: "artigos por perfil"
      - value: "<3s"

# Landing page content — v10
# Most content is now hardcoded in components for the v10 redesign.
# This file serves as a content reference.

hero:
  badge: "Novo — Avaliação de imagens"
  title: "A inteligência editorial em que jornalistas podem confiar"
  subtitle: "Criada para quem produz conteúdo com qualidade, contexto e velocidade na era da IA."

proof:
  cards:
    - quote: "Antes eu levava 40 minutos ajustando título e meta. Agora o Atalaya faz a primeira sugestão melhor do que eu faria com pressa."
      name: "Editor-chefe"
      role: "Redação digital — 12 anos de experiência"
      initials: "RC"
    - quote: "Pela primeira vez, a IA não inventa — ela conhece nosso manual, nosso tom. Os repórteres aceitam as sugestões porque reconhecem a própria voz."
      name: "Coordenadora de Digital"
      role: "Gestão editorial — 8 anos"
      initials: "ML"
    - quote: "O radar de tendências mudou nosso timing. Publicamos sobre temas antes dos concorrentes porque o dado já estava lá, filtrado pela nossa editoria."
      name: "Editor de Esportes"
      role: "Cobertura ao vivo — 15 anos"
      initials: "AF"
    - quote: "Não é mais IA genérica. É a IA que sabe que minha editoria de política tem regras diferentes da de entretenimento. Isso muda tudo."
      name: "Repórter Especial"
      role: "Política e investigação — 10 anos"
      initials: "PS"
    - quote: "Os dados de performance por editoria abriram nossos olhos. Descobrimos que imagem era o fator decisivo em 5 das 13 editorias."
      name: "Gerente de Produto"
      role: "Transformação digital — 6 anos"
      initials: "JV"
    - quote: "A correção é cirúrgica — só pega erro real, nunca inventa problema. Meus repórteres confiam porque nunca saiu uma sugestão errada."
      name: "Editora de Cidades"
      role: "Jornalismo diário — 9 anos"
      initials: "TB"

values:
  statement: "Uma nova categoria de ferramenta editorial. Construída para as práticas de redações de alto desempenho, com IA contextual no centro de cada decisão, o Atalaya define um novo padrão para produção de conteúdo."
  cards:
    - fig: "0.2"
      title: "Construído com propósito"
      description: "Moldado pelas práticas e princípios das melhores redações. Não é uma ferramenta genérica adaptada para jornalismo."
    - fig: "0.3"
      title: "Alimentado por dados reais"
      description: "Histórico completo de performance por editoria. A IA só opera com contexto — manual, voz e dados do domínio."
    - fig: "0.4"
      title: "Projetado para velocidade"
      description: "Reduz ruído e restaura momentum. Publica com velocidade e foco, sem trocar qualidade por pressa."

features:
  - id: "optimize"
    title: "Da pauta à publicação, sem retrabalho"
    description: "Revisão automática de título, imagem, estrutura e SEO — calibrada pelo Manual de Redação e pelos dados reais do seu domínio."
    link: "1.0 Optimize"
    stats:
      - value: "85%"
        label: "menos tempo de edição"
      - value: "7"
        label: "campos por matéria"
      - value: "100%"
        label: "revisão humana"
    subs:
      - "1.1 Reescrita"
      - "1.2 Correção"
      - "1.3 Revisão HTML"
      - "1.4 Avaliação de imagem"

  - id: "trends"
    title: "Detecte oportunidades antes da concorrência publicar"
    description: "Acompanhe o que está ganhando força na busca e no Discover — filtrado pelos assuntos em que sua redação já tem autoridade."
    link: "2.0 Trends"
    stats:
      - value: "47min"
        label: "antes da concorrência"
      - value: "3.2x"
        label: "mais tráfego Discover"
      - value: "24/7"
        label: "monitoramento ativo"
    subs:
      - "2.1 Radar Discover"
      - "2.2 Tendências de Pesquisa"
      - "2.3 Insights Editoriais"

  - id: "voice"
    title: "Cada jornalista tem um agente que escreve como ele"
    description: "A IA analisa como cada jornalista escreve — estilo, tom, estrutura — e aprende a gerar sugestões que soam como ele."
    link: "3.0 Voz editorial"
    stats:
      - value: "92%"
        label: "aderência à voz"
      - value: "500+"
        label: "artigos por perfil"
      - value: "<3s"
        label: "para gerar na voz"
    subs:
      - "3.1 Perfis de voz"
      - "3.2 Wizard de onboarding"
      - "3.3 Agentes por editoria"

pipeline:
  label: "Data before AI"
  title: "Dados primeiro. IA depois."
  subtitle: "O Atalaya coleta dados reais do seu domínio e só então aciona a IA — com contexto, não adivinhação."
  steps:
    - number: "01"
      title: "Aprende com o seu domínio"
      description: "Coleta o histórico de performance das suas matérias — o que foi lido, clicado, ignorado. Busca e Discover separados."
    - number: "02"
      title: "Mapeia a redação"
      description: "Identifica quem escreve sobre o quê, quais editorias performam melhor e onde estão as oportunidades."
    - number: "03"
      title: "Calibra por editoria"
      description: "Descobre o que funciona em cada editoria — o peso da imagem, do título, da estrutura — com base nos seus próprios dados."
    - number: "04"
      title: "IA com contexto"
      description: "Só então a IA entra — com o Manual de Redação, o perfil de voz do jornalista e os dados de performance como guia."


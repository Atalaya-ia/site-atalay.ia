pipeline:
  label: "Data before AI"
  title: "Dados primeiro. IA depois."
  subtitle: "O Atalaya coleta dados reais do seu dominio e so entao aciona a IA — com contexto, nao adivinhacao."
  steps:
    - number: "01"
      title: "Aprende com o seu dominio"
      description: "Coleta o historico de performance das suas materias — o que foi lido, clicado, ignorado. Busca e Discover separados."
    - number: "02"
      title: "Mapeia a redacao"
      description: "Identifica quem escreve sobre o que, quais editorias performam melhor e onde estao as oportunidades."
    - number: "03"
      title: "Calibra por editoria"
      description: "Descobre o que funciona em cada editoria — o peso da imagem, do titulo, da estrutura — com base nos seus proprios dados."
    - number: "04"
      title: "IA com contexto"
      description: "So entao a IA entra — com o Manual de Redacao, o perfil de voz do jornalista e os dados de performance como guia."

